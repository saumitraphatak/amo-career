    .filter-bar { display:flex; flex-wrap:wrap; gap:var(--sp-2); align-items:center; margin-bottom:var(--sp-4); }
    .filter-label { font-size:.75rem; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:var(--text-muted); margin-right:var(--sp-1); }
    .filter-btn { padding:5px 14px; border-radius:999px; border:1px solid var(--border); background:transparent; color:var(--text-secondary); font-size:.8125rem; font-weight:600; cursor:pointer; transition:all var(--t); display:flex; align-items:center; gap:6px; }

    .filter-btn:hover { background:var(--bg-card); color:var(--text-primary); }

    /* Group info panel */
    #group-panel { display:none; background:var(--bg-card); border:1px solid var(--border); border-radius:var(--r-lg); padding:var(--sp-5); margin-bottom:var(--sp-5); position:relative; }
    #group-panel.visible { display:block; }
    .gp-close { position:absolute; top:var(--sp-3); right:var(--sp-3); background:none; border:none; color:var(--text-muted); cursor:pointer; font-size:1.25rem; line-height:1; }
    .gp-close:hover { color:var(--text-primary); }
    .gp-header { display:flex; gap:var(--sp-4); align-items:flex-start; margin-bottom:var(--sp-4); }
    .gp-tag-dot { width:14px; height:14px; border-radius:50%; flex-shrink:0; margin-top:5px; }
    .gp-name { font-size:1.125rem; font-weight:700; color:var(--text-primary); margin:0 0 2px; }
    .gp-pi   { font-size:.875rem; color:var(--text-secondary); }
    .gp-inst { font-size:.8125rem; color:var(--text-muted); margin-top:2px; }
    .gp-body { display:grid; grid-template-columns:1fr 1fr; gap:var(--sp-4); }
    @media(max-width:620px){ .gp-body { grid-template-columns:1fr; } }
    .gp-row  { display:flex; flex-direction:column; gap:3px; }
    .gp-key  { font-size:.7rem; font-weight:700; text-transform:uppercase; letter-spacing:.08em; color:var(--text-muted); }
    .gp-val  { font-size:.875rem; color:var(--text-secondary); }
    .gp-atoms { display:flex; flex-wrap:wrap; gap:4px; }
    .atom-chip { padding:2px 9px; border-radius:999px; font-size:.75rem; font-weight:700; background:rgba(74,222,128,0.1); color:#4ade80; border:1px solid rgba(74,222,128,0.25); }

    .hire-no  { color:var(--text-muted); }
    .gp-paper { margin-top:var(--sp-3); padding:var(--sp-3) var(--sp-4); background:rgba(0,0,0,0.15); border-radius:var(--r); font-size:.8125rem; }
    .gp-paper-label { font-size:.7rem; font-weight:700; text-transform:uppercase; letter-spacing:.08em; color:var(--text-muted); margin-bottom:4px; }
    .gp-paper a { color:#818cf8; text-decoration:none; }
    .gp-paper a:hover { text-decoration:underline; }

    .group-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:var(--sp-3); }
    .group-card { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--r-lg); padding:var(--sp-4); cursor:pointer; transition:border-color var(--t), background var(--t); }

    .gc-dot  { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
    .gc-name { font-size:.875rem; font-weight:700; color:var(--text-primary); }

    .gc-focus{ font-size:.8125rem; color:var(--text-secondary); line-height:1.5; }

    #group-search { flex:1; padding:9px 14px; background:var(--bg-card); border:1px solid var(--border); border-radius:var(--r); color:var(--text-primary); font-size:.875rem; outline:none; transition:border-color var(--t); }

  { name:'Takahashi Lab', pi:'Yoshiro Takahashi', inst:'Kyoto University', country:'Japan', lat:35.028, lon:135.781, atoms:['Yb'], tag:'sim', focus:'Yb quantum simulation, SU(N) Hubbard model, orbital magnetism, two-orbital physics', paper:'Ozawa et al., PRL 121, 225303 (2018)', doi:'10.1103/PhysRevLett.121.225303', hire:true },
  { name:'Katori Lab', pi:'Hidetoshi Katori', inst:'Univ. Tokyo', country:'Japan', lat:35.714, lon:139.761, atoms:['Sr','Yb'], tag:'clocks', focus:'Optical lattice clocks (inventor of magic wavelength), Sr and Hg clocks, relativistic geodesy', paper:'Katori, Nature Photonics 5, 203 (2011)', doi:'10.1038/nphoton.2011.45', hire:true },
  { name:'Ohmori Lab', pi:'Kenji Ohmori', inst:'IMS Okazaki', country:'Japan', lat:34.973, lon:137.175, atoms:['Rb'], tag:'rydberg', focus:'Rydberg many-body dynamics, ultrafast quantum control, optical-clock-referenced Rydberg spectroscopy', paper:'Takei et al., Nature Comm. 7, 13449 (2016)', doi:'10.1038/ncomms13449', hire:true },

  { name:'Pan Lab', pi:'Jian-Wei Pan', inst:'USTC Hefei', country:'China', lat:31.837, lon:117.226, atoms:['Rb','Sr'], tag:'rydberg', focus:'Photonic QC, Rydberg tweezer arrays, quantum communication, boson sampling', paper:'Ebadi et al.-like Zhong et al., Science 370, 1460 (2020)', doi:'10.1126/science.abe8770', hire:true },
  { name:'Lu / Liu Dipolar Lab', pi:'Biao Wu / Lifang Liu (varies)', inst:'USTC Hefei', country:'China', lat:31.838, lon:117.227, atoms:['Dy','Er'], tag:'dipolar', focus:'Dipolar quantum gases, Er/Dy condensates, exotic phases in anisotropic traps', paper:'Tang et al., PRL 120, 230401 (2018)', doi:'10.1103/PhysRevLett.120.230401', hire:true },
  { name:'Zhu / Duan Lab', pi:'Shi-Liang Zhu', inst:'SCNU Guangzhou', country:'China', lat:23.131, lon:113.370, atoms:['Rb'], tag:'sim', focus:'Quantum simulation of topological matter, synthetic gauge fields, quantum Hall physics', paper:'Wu et al., Science 354, 83 (2016)', doi:'10.1126/science.aaf6689', hire:true },

  /* ── Singapore ── */
  { name:'Lan Lab', pi:'Shau-Yu Lan', inst:'Nanyang Tech. Univ.', country:'Singapore', lat:1.348, lon:103.682, atoms:['Rb'], tag:'clocks', focus:'Atom interferometry, compact atomic clocks, quantum sensing, gravimetry', paper:'Chen et al., PRL 123, 143204 (2019)', doi:'10.1103/PhysRevLett.123.143204', hire:true },

  /* ── Australia ── */
  { name:'Andersen Group', pi:'Halina Rubinsztein-Dunlop', inst:'Univ. Queensland', country:'Australia', lat:-27.497, lon:153.013, atoms:['Rb'], tag:'sim', focus:'BEC, optical tweezers, quantum gas microscope, vortex dynamics, quantum simulation', paper:'Rubinsztein-Dunlop et al., J. Opt. 19, 013001 (2016)', doi:'10.1088/2040-8978/19/1/013001', hire:true },

  /* ── India ── */
  { name:'Rangwala Lab', pi:'Sadiq A. Rangwala', inst:'RRI Bangalore', country:'India', lat:13.003, lon:77.571, atoms:['Rb','Ca+'], tag:'ions', focus:'Hybrid ion-atom traps, cold reactive collisions, atom-ion interactions, laser-cooled Ca⁺', paper:'Haze et al., PRA 87, 052715 (2013)', doi:'10.1103/PhysRevA.87.052715', hire:true },

  /* ── Canada ── */
  { name:'Thywissen Lab', pi:'Joseph Thywissen', inst:'Univ. Toronto', country:'Canada', lat:43.663, lon:-79.397, atoms:['K','Rb'], tag:'bec', focus:'Fermi-Hubbard model, spin dynamics, quantum gas microscope, few-body physics', paper:'Murthy et al., PRL 115, 173202 (2015)', doi:'10.1103/PhysRevLett.115.173202', hire:true },
  { name:'Hauke / Duan Theory', pi:'Philipp Hauke', inst:'Univ. Trento', country:'Italy', lat:46.064, lon:11.121, atoms:[], tag:'sim', focus:'Theory: quantum simulation of lattice gauge theories, tensor networks, AMO-HEP connection', paper:'Hauke et al., Nature Physics 8, 325 (2012)', doi:'10.1038/nphys2253', hire:true },
];

/* ─── Tag → color mapping ─── */
const TAG_COLORS = {
  rydberg:'#818cf8', sim:'#34d399', clocks:'#fbbf24',
  bec:'#60a5fa', molecules:'#2dd4bf', cavity:'#c084fc',
  dipolar:'#f472b6', ions:'#fb923c',
};
const TAG_LABELS = {
  rydberg:'Rydberg / QC', sim:'Quantum Simulation', clocks:'Clocks & Metrology',
  bec:'BEC / Fermions', molecules:'Molecules', cavity:'Cavity QED',
  dipolar:'Dipolar', ions:'Ions',
};

/* ─── Active filter ─── */
let activeTag = 'all';
let mapPoints; // amCharts series

/* ─── Init amCharts map ─── */
window.addEventListener('DOMContentLoaded', () => {
  const root = am5.Root.new('map-root');
  root.setThemes([am5themes_Animated.new(root)]);

  const chart = root.container.children.push(am5map.MapChart.new(root, {
    panX:'rotateX', panY:'none', projection:am5map.geoNaturalEarth1(),
    wheelY:'none',
  }));

  // Background
  chart.series.push(am5map.MapPolygonSeries.new(root, {
    geoJSON: am5geodata_worldLow,
    fill: am5.color(0x0c1526),
    stroke: am5.color(0x1e3a5f),
  }));

  // Point series
  mapPoints = chart.series.push(am5map.MapPointSeries.new(root, {}));

  mapPoints.bullets.push((root, series, dataItem) => {
    const g = am5.Graphics.new(root, {
      svgPath:'M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z',
      scale:0.9,
      centerX:am5.percent(50), centerY:am5.percent(100),
      fill: am5.color(dataItem.dataContext.color || 0x818cf8),
      fillOpacity:0.9,
      cursorOverStyle:'pointer',
      tooltipText:'',
    });

    g.events.on('click', (ev) => {
      const d = ev.target.dataItem.dataContext;
      showPanel(d.groupIdx);
    });
    g.events.on('pointerover', (ev) => {
      ev.target.set('fillOpacity', 1);
      ev.target.set('scale', 1.15);
    });
    g.events.on('pointerout', (ev) => {
      ev.target.set('fillOpacity', 0.9);
      ev.target.set('scale', 0.9);
    });
    return am5.Bullet.new(root, { sprite: g });
  });

  loadMapPoints(GROUPS);
  buildGrid(GROUPS);
  document.getElementById('result-count').textContent = `${GROUPS.length} groups`;

  // Filter buttons
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      activeTag = btn.dataset.tag;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const filtered = activeTag === 'all' ? GROUPS : GROUPS.filter(g => g.tag === activeTag);
      loadMapPoints(filtered);
      buildGrid(filtered);
      document.getElementById('group-search').value = '';
      document.getElementById('result-count').textContent = `${filtered.length} groups`;
    });
  });
});

function loadMapPoints(groups) {
  mapPoints.data.setAll(groups.map((g, i) => ({
    geometry:{ type:'Point', coordinates:[g.lon, g.lat] },
    color: TAG_COLORS[g.tag] || '#94a3b8',
    groupIdx: GROUPS.indexOf(g),
    title: g.name,
  })));
}

function showPanel(idx) {
  const g = GROUPS[idx];
  const col = TAG_COLORS[g.tag] || '#94a3b8';
  document.getElementById('panel-content').innerHTML = `
    <div class="gp-header">
      <div class="gp-tag-dot" style="background:${col}"></div>
      <div>
        <div class="gp-name">${g.name}</div>
        <div class="gp-pi">PI: ${g.pi}</div>
        <div class="gp-inst">${g.inst} · ${g.country}</div>
      </div>
      <div style="margin-left:auto;padding:4px 12px;border-radius:999px;font-size:.72rem;font-weight:700;background:rgba(0,0,0,0.2);color:${col}">${TAG_LABELS[g.tag]||g.tag}</div>
    </div>
    <div class="gp-body">
      <div class="gp-row">
        <div class="gp-key">Research Focus</div>
        <div class="gp-val">${g.focus}</div>
      </div>
      <div class="gp-row">
        <div class="gp-key">Atom(s) Used</div>
        <div class="gp-atoms">${g.atoms.length ? g.atoms.map(a=>`<span class="atom-chip">${a}</span>`).join('') : '<span style="color:var(--text-muted)">Theory (no experiment)</span>'}</div>
      </div>
      <div class="gp-row">
        <div class="gp-key">International Hiring</div>
        <div class="${g.hire?'hire-yes':'hire-no'}">${g.hire ? '✓ Typically hires international students & postdocs' : 'Primarily domestic hiring'}</div>
      </div>
      <div class="gp-row">
        <div class="gp-key">Country</div>
        <div class="gp-val">${g.country}</div>
      </div>
    </div>
    ${g.paper ? `<div class="gp-paper">
      <div class="gp-paper-label">Flagship / Representative Paper</div>
      <a href="https://doi.org/${g.doi}" target="_blank" rel="noopener">${g.paper} →</a>
    </div>` : ''}
  `;
  document.getElementById('group-panel').classList.add('visible');
  document.getElementById('group-panel').scrollIntoView({ behavior:'smooth', block:'nearest' });
}

function closePanel() {
  document.getElementById('group-panel').classList.remove('visible');
}

function buildGrid(groups) {
  document.getElementById('group-grid').innerHTML = groups.map(g => {
    const col = TAG_COLORS[g.tag] || '#94a3b8';
    const idx = GROUPS.indexOf(g);
    return `<div class="group-card" onclick="showPanel(${idx})">
      <div class="gc-head"><div class="gc-dot" style="background:${col}"></div><div class="gc-name">${g.name}</div></div>
      <div class="gc-inst">${g.inst} · ${g.country}</div>
      <div class="gc-focus">${g.focus}</div>
    </div>`;
  }).join('');
}

function filterGroups() {
  const q = document.getElementById('group-search').value.toLowerCase();
  const base = activeTag === 'all' ? GROUPS : GROUPS.filter(g => g.tag === activeTag);
  const filtered = q ? base.filter(g =>
    g.pi.toLowerCase().includes(q) ||
    g.inst.toLowerCase().includes(q) ||
    g.focus.toLowerCase().includes(q) ||
    g.atoms.some(a => a.toLowerCase().includes(q)) ||
    g.country.toLowerCase().includes(q) ||
    g.name.toLowerCase().includes(q)
  ) : base;
  buildGrid(filtered);
  loadMapPoints(filtered);
  document.getElementById('result-count').textContent = `${filtered.length} group${filtered.length!==1?'s':''}`;
}
</script>

<script src="../js/main.js?v=11"></script>
